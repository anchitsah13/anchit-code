<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJ BMI Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calculator {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            background: white;
            transition: all 0.3s ease;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .result {
            margin-top: 30px;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }

        .bmi-value {
            font-size: 3em;
            margin: 10px 0;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .underweight { background-color: #ffeaa7; }
        .normal { background-color: #00b894; }
        .overweight { background-color: #fdcb6e; }
        .obese { background-color: #e17055; }

        .category {
            font-size: 1.2em;
            margin: 10px 0;
        }

        .health-text {
            font-size: 16px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>JJ BMI</h1>
        
        <div class="input-group">
            <label for="weight">Weight (kg):</label>
            <input type="number" id="weight" step="0.1" min="0" placeholder="e.g. 70.5">
        </div>

        <div class="input-group">
            <label for="height">Height (cm):</label>
            <input type="number" id="height" step="0.1" min="0" placeholder="e.g. 175">
        </div>

        <div class="input-group">
            <label for="unit">Unit System:</label>
            <select id="unit">
                <option value="metric">Metric (kg/cm)</option>
                <option value="imperial">Imperial (lbs/inches)</option>
            </select>
        </div>

        <button onclick="calculateBMI()">Calculate BMI</button>

        <div id="result" class="result">
            <div class="bmi-value" id="bmiValue">0</div>
            <div class="category" id="category"></div>
            <div class="health-text" id="healthText"></div>
        </div>
    </div>

    <script>
        function calculateBMI() {
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            const unit = document.getElementById('unit').value;
            
            if (!weight || !height || weight <= 0 || height <= 0) {
                alert('Please enter valid weight and height values!');
                return;
            }

            let bmi;
            if (unit === 'imperial') {
                // Convert lbs to kg and inches to meters
                const weightKg = weight * 0.453592;
                const heightM = height * 0.0254;
                bmi = weightKg / (heightM * heightM);
            } else {
                // Metric: kg and cm
                const heightM = height / 100;
                bmi = weight / (heightM * heightM);
            }

            displayResult(bmi);
        }

        function displayResult(bmi) {
            const result = document.getElementById('result');
            const bmiValue = document.getElementById('bmiValue');
            const category = document.getElementById('category');
            const healthText = document.getElementById('healthText');

            bmiValue.textContent = bmi.toFixed(1);
            
            let categoryText = '';
            let categoryClass = '';
            let healthMessage = '';

            if (bmi < 18.5) {
                categoryText = 'Underweight';
                categoryClass = 'underweight';
                healthMessage = 'Consider consulting a nutritionist for healthy weight gain.';
            } else if (bmi < 25) {
                categoryText = 'Normal Weight';
                categoryClass = 'normal';
                healthMessage = 'Excellent! Keep maintaining a healthy lifestyle.';
            } else if (bmi < 30) {
                categoryText = 'Overweight';
                categoryClass = 'overweight';
                healthMessage = 'Consider increasing physical activity and balanced diet.';
            } else {
                categoryText = 'Obese';
                categoryClass = 'obese';
                healthMessage = 'Consult a healthcare professional for personalized advice.';
            }

            result.className = result ${categoryClass};
            category.textContent = categoryText;
            healthText.textContent = healthMessage;
            result.style.display = 'block';
        }

        // Allow Enter key to calculate
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculateBMI();
            }
        });
    </script>
</body>
</html>
