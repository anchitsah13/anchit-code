<!DOCTYPE html>
<html>
    <head>
        <title>navbar</title>
        <style>
            body{
                margin: 0;
                font-family: Arial, Helvetica, sans-serif;
            }
            .topnav{
                overflow: hidden;
                background-color: #333;
            }
            .topnav a{
                float: left;
                color: #1affa3;
                text-align: center;
                padding: 14px 16px;
                text-decoration: none;
                font-size: 17px;
            }
            .topnav a:hover{
                background-color: #ddd;
                color: black;
            }
            .topnav a.active{
                background-color: #ffe066;
                color: black;
            }
        </style>
    </head>
    <body>
        <div class="topnav">
        <a href="#home" class="active">HOME</a>
        <a href="#">ABOUT US</a>
        <a href="#">GALLERY</a>
        <a href="#">CONTACT US</a>
        </div>
    </body>
</html>
